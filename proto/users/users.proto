syntax = "proto3";

package github.chas3air.protos.users;

option go_package = "chas3air.users.v1;usersv1";

import "google/protobuf/empty.proto";

// Users service provides operations for managing user data.
service Users {
    // GetUsers retrieves a paginated list of all users.
    rpc GetUsers (GetUsersRequest) returns (GetUsersResponse);
    // GetUserById retrieves a specific user by their ID.
    rpc GetUserById (GetUserByIdRequest) returns (GetUserByIdResponse);
    // Insert creates a new user record.
    rpc Insert (InsertRequest) returns (google.protobuf.Empty);
    // Update modifies an existing user record.
    rpc Update (UpdateRequest) returns (google.protobuf.Empty);
    // Delete removes a user record by ID.
    rpc Delete (DeleteRequest) returns (google.protobuf.Empty);
}

message GetUsersRequest {
    int32 offset = 1;
    int32 limit = 2;
}

message GetUsersResponse {
    repeated User users = 1;
}

message GetUserByIdRequest {
    string id = 1;
}
message GetUserByIdResponse {
    User user = 1;
}

message User {
    string id = 1;
    string name = 2;
    string login = 3;
    string password = 4;
    string phone = 5;
}

message InsertRequest {
    User user = 1;
}

message UpdateRequest {
    string id = 1;
    User user = 2;
}

message DeleteRequest {
    string id = 1;
}